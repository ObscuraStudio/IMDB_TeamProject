spring.application.name=backend

# --- OMDb API (test values) ---
# Tests must not depend on the real OMDB_API_KEY secret. These dummy values
# let the Spring context load in CI; no real OMDb call is made by contextLoads.
omdb.api.base-url=http://localhost
omdb.api.key=test-api-key

# --- OAuth2 (dummy test values) ---
# SecurityConfig.oauth2Login needs a ClientRegistrationRepository, which Spring
# only builds when a registration exists. These dummy values let the context
# load in CI without the real GitHub client credentials.
spring.security.oauth2.client.registration.github.client-id=test-client-id
spring.security.oauth2.client.registration.github.client-secret=test-client-secret

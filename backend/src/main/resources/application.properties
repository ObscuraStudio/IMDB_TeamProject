spring.application.name=backend
# --- OMDb API ---
omdb.api.base-url=http://www.omdbapi.com
omdb.api.key=${OMDB_API_KEY}
# --- Mongo DB URL ---
spring.data.mongodb.uri=${MONGO_DB_URI}
# --- Frontend URL for OAuth redirects (overridden by FRONTEND_URL on deploy) ---
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
# --- OAuth ---
spring.security.oauth2.client.registration.github.client-id=${CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=none
